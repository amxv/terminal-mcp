name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Build executables
      run: bun run build

    - name: Check if prerelease
      id: check_prerelease
      run: |
        if [[ "${{ github.ref }}" =~ -alpha\.|beta\.|rc\. ]]; then
          echo "is_prerelease=true" >> $GITHUB_OUTPUT
        else
          echo "is_prerelease=false" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
        files: |
          ./dist/terminal-mcp-macos-arm64.tar.gz
          ./dist/terminal-mcp-macos-x64.tar.gz
          ./dist/terminal-mcp-linux-x64.tar.gz
          ./dist/terminal-mcp-linux-arm64.tar.gz
          ./dist/terminal-mcp-agent-linux-x64.tar.gz
          ./dist/terminal-mcp-agent-linux-arm64.tar.gz
          ./dist/terminal-mcp-agent-macos-arm64.tar.gz
          ./dist/terminal-mcp-agent-macos-x64.tar.gz
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}